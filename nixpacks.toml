[phases.setup]
nixPkgs = ["python313", "nodejs_20", "npm-9_x", "ffmpeg", "libsndfile"]

[phases.install]
cmds = [
  "pip install -r requirements.txt",
  "cd frontend && npm install"
]

[phases.build]
cmds = [
  "cd frontend && npm run build"
]

[start]
cmd = "uvicorn main:app --host 0.0.0.0 --port $PORT"
